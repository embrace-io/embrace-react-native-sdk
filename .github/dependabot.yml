version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github:
        patterns:
          - "actions/*"
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 50
    groups:
      jest:
        patterns:
          - '*jest*'
      eslint:
        patterns:
          - '*eslint*'
      babel:
        patterns:
          - '@babel*'
      react:
        patterns:
          - 'react'
          - 'react-dom'
          - 'react-test-renderer'
