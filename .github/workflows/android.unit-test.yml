name: Android Unit Tests

on:
  workflow_call:
    inputs:
      force:
        description: "Run all tests regardless of changed files"
        required: false
        default: false
        type: boolean
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".node-version"
          cache: "npm"

      - name: Enables corepack
        run: corepack enable

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: changed_files
        with:
          list-files: shell
          filters: |
            android:
            - 'packages/**/gradle.properties'
            - 'packages/**/*.gradle'
            - 'packages/**/*.kt'
            - 'packages/**/*.java'

      - name: Install Root Node Modules
        run: yarn install
        if: ${{ inputs.force || steps.changed_files.outputs.android == 'true' }}

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        if: ${{ inputs.force || steps.changed_files.outputs.android == 'true' }}
        with:
          distribution: "adopt"
          java-version-file: ".java-version"

      - name: Run Android Unit Tests
        if: ${{ inputs.force || steps.changed_files.outputs.android == 'true' }}
        env:
          FORCE: ${{ inputs.force }}
          ANDROID_FILES: ${{ steps.changed_files.outputs.android_files }}
        run: |
          if [ "$FORCE" = "true" ]; then
            yarn run android:test
          else
            yarn run android:test $(./scripts/scopes-from-file-changes.ts "$ANDROID_FILES")
          fi
