name: iOS Unit Tests

on:
  workflow_call:
    inputs:
      run_all:
        description: "Run tests for all packages, ignoring changed-file filters"
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      run_all:
        description: "Run tests for all packages, ignoring changed-file filters"
        type: boolean
        default: true
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  build:
    runs-on: macos-26
    steps:
      - name: Select Xcode
        # See https://github.com/actions/runner-images/blob/main/images/macos/macos-26-Readme.md
        run: |
          sudo xcode-select -s /Applications/Xcode_26.3.app
          xcodebuild -version
      
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".node-version"
          cache: "npm"

      - name: Enables corepack
        run: corepack enable

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: changed_files
        if: ${{ !inputs.run_all }}
        with:
          list-files: shell
          filters: |
            ios:
            - 'packages/**/*.swift'
            - 'packages/**/*.m'
            - 'packages/**/*.h'
            - 'packages/**/test-project/ios/Podfile.lock'

      - name: Install Root Node Modules
        run: yarn install
        if: ${{ inputs.run_all || steps.changed_files.outputs.ios == 'true' }}

      - name: Linting
        run: yarn run lint:swift
        if: ${{ inputs.run_all || steps.changed_files.outputs.ios == 'true' }}

  test-core:
    runs-on: macos-26
    steps:
      - name: Select Xcode
        # See https://github.com/actions/runner-images/blob/main/images/macos/macos-26-Readme.md
        run: |
          sudo xcode-select -s /Applications/Xcode_26.3.app
          xcodebuild -version

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".node-version"
          cache: "npm"

      - name: Enables corepack
        run: corepack enable

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: changed_files
        if: ${{ !inputs.run_all }}
        with:
          list-files: shell
          filters: |
            core:
            - 'packages/core/**/*.swift'
            - 'packages/core/**/*.m'
            - 'packages/core/**/*.h'
            - 'packages/core/test-project/ios/Podfile.lock'

      - name: Cache Derived Data
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: Derived-Data-Core-${{ runner.os }}-${{ hashFiles('packages/core/**/*.xcodeproj/project.pbxproj', 'packages/core/test-project/ios/Podfile.lock') }}
          restore-keys: |
            Derived-Data-Core-${{ runner.os }}
        if: ${{ inputs.run_all || steps.changed_files.outputs.core == 'true' }}

      - name: Install Root Node Modules
        run: yarn install
        if: ${{ inputs.run_all || steps.changed_files.outputs.core == 'true' }}

      - name: Install Core Package Dependencies
        run: yarn run ios:install:core
        if: ${{ inputs.run_all || steps.changed_files.outputs.core == 'true' }}

      - name: Check System Resources (Before Tests)
        if: ${{ inputs.run_all || steps.changed_files.outputs.core == 'true' }}
        run: |
          echo "=== Disk Space ==="
          df -h
          echo "=== Memory Stats ==="
          vm_stat
          echo "=== Top Processes ==="
          top -l 1 -n 10 -stats pid,command,mem

      - name: Run Core iOS Unit Tests
        run: yarn run ios:test:core
        if: ${{ inputs.run_all || steps.changed_files.outputs.core == 'true' }}
        env:
          IOS_TEST_WAIT_TIME: "15"

      - name: Upload Test Results (xcresult bundle)
        if: ${{ always() && (inputs.run_all || steps.changed_files.outputs.core == 'true') }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ios-core-test-results
          path: ~/Library/Developer/Xcode/DerivedData/RNEmbraceCoreTests-*/Logs/Test/*.xcresult
          if-no-files-found: warn
          retention-days: 7

      - name: Check System Resources (After Tests)
        if: ${{ always() && (inputs.run_all || steps.changed_files.outputs.core == 'true') }}
        run: |
          echo "=== Disk Space ==="
          df -h
          echo "=== Memory Stats ==="
          vm_stat
          echo "=== DerivedData Size ==="
          du -sh ~/Library/Developer/Xcode/DerivedData || echo "DerivedData not found"

  test-tracer-provider:
    runs-on: macos-26
    steps:
      - name: Select Xcode
        # See https://github.com/actions/runner-images/blob/main/images/macos/macos-26-Readme.md
        run: |
          sudo xcode-select -s /Applications/Xcode_26.3.app
          xcodebuild -version
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".node-version"
          cache: "npm"

      - name: Enables corepack
        run: corepack enable

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: changed_files
        if: ${{ !inputs.run_all }}
        with:
          list-files: shell
          filters: |
            tracer-provider:
            - 'packages/react-native-tracer-provider/**/*.swift'
            - 'packages/react-native-tracer-provider/**/*.m'
            - 'packages/react-native-tracer-provider/**/*.h'
            - 'packages/react-native-tracer-provider/test-project/ios/Podfile.lock'

      - name: Cache Derived Data
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: Derived-Data-TracerProvider-${{ runner.os }}-${{ hashFiles('packages/react-native-tracer-provider/**/*.xcodeproj/project.pbxproj', 'packages/react-native-tracer-provider/test-project/ios/Podfile.lock') }}
          restore-keys: |
            Derived-Data-TracerProvider-${{ runner.os }}
        if: ${{ inputs.run_all || steps.changed_files.outputs.tracer-provider == 'true' }}

      - name: Install Root Node Modules
        run: yarn install
        if: ${{ inputs.run_all || steps.changed_files.outputs.tracer-provider == 'true' }}

      - name: Install Tracer Provider Package Dependencies
        run: yarn run ios:install:tracer-provider
        if: ${{ inputs.run_all || steps.changed_files.outputs.tracer-provider == 'true' }}

      - name: Check System Resources (Before Tests)
        if: ${{ inputs.run_all || steps.changed_files.outputs.tracer-provider == 'true' }}
        run: |
          echo "=== Disk Space ==="
          df -h
          echo "=== Memory Stats ==="
          vm_stat
          echo "=== Top Processes ==="
          top -l 1 -n 10 -stats pid,command,mem

      - name: Run Tracer Provider iOS Unit Tests
        run: yarn run ios:test:tracer-provider
        if: ${{ inputs.run_all || steps.changed_files.outputs.tracer-provider == 'true' }}

      - name: Upload Test Results (xcresult bundle)
        if: ${{ always() && (inputs.run_all || steps.changed_files.outputs.tracer-provider == 'true') }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ios-tracer-provider-test-results
          path: ~/Library/Developer/Xcode/DerivedData/RNEmbraceTracerProvider-*/Logs/Test/*.xcresult
          if-no-files-found: warn
          retention-days: 7

      - name: Check System Resources (After Tests)
        if: ${{ always() && (inputs.run_all || steps.changed_files.outputs.tracer-provider == 'true') }}
        run: |
          echo "=== Disk Space ==="
          df -h
          echo "=== Memory Stats ==="
          vm_stat
          echo "=== DerivedData Size ==="
          du -sh ~/Library/Developer/Xcode/DerivedData || echo "DerivedData not found"

  # All iOS tests run WITHOUT code coverage due to performance/memory constraints on macos-latest.
  # USE_FRAMEWORKS=dynamic (required for EmbraceIO 6.14.1+) combined with code coverage creates
  # excessive build times and memory pressure on free CI runners. Code coverage can be collected
  # locally where hardware resources are better. See scripts/run-ios-tests-no-coverage.sh
  test-otlp:
    runs-on: macos-26
    steps:
      - name: Select Xcode
        # See https://github.com/actions/runner-images/blob/main/images/macos/macos-26-Readme.md
        run: |
          sudo xcode-select -s /Applications/Xcode_26.3.app
          xcodebuild -version
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".node-version"
          cache: "npm"

      - name: Enables corepack
        run: corepack enable

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: changed_files
        if: ${{ !inputs.run_all }}
        with:
          list-files: shell
          filters: |
            otlp:
            - 'packages/react-native-otlp/**/*.swift'
            - 'packages/react-native-otlp/**/*.m'
            - 'packages/react-native-otlp/**/*.h'
            - 'packages/react-native-otlp/test-project/ios/Podfile.lock'

      - name: Cache Derived Data
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: Derived-Data-OTLP-${{ runner.os }}-${{ hashFiles('packages/react-native-otlp/**/*.xcodeproj/project.pbxproj', 'packages/react-native-otlp/test-project/ios/Podfile.lock') }}
          restore-keys: |
            Derived-Data-OTLP-${{ runner.os }}
        if: ${{ inputs.run_all || steps.changed_files.outputs.otlp == 'true' }}

      - name: Install Root Node Modules
        run: yarn install
        if: ${{ inputs.run_all || steps.changed_files.outputs.otlp == 'true' }}

      - name: Install OTLP Package Dependencies
        run: yarn run ios:install:otlp
        if: ${{ inputs.run_all || steps.changed_files.outputs.otlp == 'true' }}

      - name: Check System Resources (Before Tests)
        if: ${{ inputs.run_all || steps.changed_files.outputs.otlp == 'true' }}
        run: |
          echo "=== Disk Space ==="
          df -h
          echo "=== Memory Stats ==="
          vm_stat
          echo "=== Top Processes ==="
          top -l 1 -n 10 -stats pid,command,mem

      - name: Run OTLP iOS Unit Tests
        run: yarn run ios:test:otlp
        if: ${{ inputs.run_all || steps.changed_files.outputs.otlp == 'true' }}

      - name: Upload Test Results (xcresult bundle)
        if: ${{ always() && (inputs.run_all || steps.changed_files.outputs.otlp == 'true') }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ios-otlp-test-results
          path: ~/Library/Developer/Xcode/DerivedData/RNEmbraceOTLPTests-*/Logs/Test/*.xcresult
          if-no-files-found: warn
          retention-days: 7

      - name: Check System Resources (After Tests)
        if: ${{ always() && (inputs.run_all || steps.changed_files.outputs.otlp == 'true') }}
        run: |
          echo "=== Disk Space ==="
          df -h
          echo "=== Memory Stats ==="
          vm_stat
          echo "=== DerivedData Size ==="
          du -sh ~/Library/Developer/Xcode/DerivedData || echo "DerivedData not found"
