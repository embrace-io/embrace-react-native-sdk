name: Post-Merge Main Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type (use patch for hotfixes)"
        required: false
        default: "minor"
        type: choice
        options: [patch, minor, major]

permissions:
  contents: read
  pull-requests: read

jobs:
  js-unit-tests:
    uses: ./.github/workflows/node.js.yml

  android-unit-tests:
    uses: ./.github/workflows/android.unit-test.yml
    with:
      force: true

  ios-unit-tests:
    uses: ./.github/workflows/ios.unit-test.yml
    with:
      force: true

  integration-tests:
    needs: [js-unit-tests, android-unit-tests, ios-unit-tests]
    uses: ./.github/workflows/integration-test.yml
    secrets:
      BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
      BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}

  pack-artifacts:
    needs: [integration-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: ".node-version"

      - run: corepack enable

      - run: yarn

      - name: Compute proposed version
        id: version
        run: |
          CURRENT=$(node -p "require('./lerna.json').version")
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)
          BUMP="${{ inputs.bump || 'minor' }}"
          if [ "$BUMP" = "major" ]; then
            echo "proposed=$((MAJOR + 1)).0.0" >> "$GITHUB_OUTPUT"
          elif [ "$BUMP" = "patch" ]; then
            echo "proposed=${MAJOR}.${MINOR}.$((PATCH + 1))" >> "$GITHUB_OUTPUT"
          else
            echo "proposed=${MAJOR}.$((MINOR + 1)).0" >> "$GITHUB_OUTPUT"
          fi

      - name: Set version (local only)
        run: npx lerna version "$PROPOSED_VERSION" --yes --no-push
        env:
          PROPOSED_VERSION: ${{ steps.version.outputs.proposed }}

      - name: Pack all packages
        run: |
          PACK_DIR="$GITHUB_WORKSPACE/pack-output"
          mkdir -p "$PACK_DIR"
          npx lerna exec -- npm pack --pack-destination "$PACK_DIR"

      - name: Upload pack artifacts
        uses: actions/upload-artifact@v4 # zizmor: ignore[unpinned-uses]
        with:
          name: npm-pack-${{ steps.version.outputs.proposed }}
          path: pack-output/
          retention-days: 30
