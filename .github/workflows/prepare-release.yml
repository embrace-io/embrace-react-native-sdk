name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Type of version bump'
        type: choice
        required: true
        options:
          - patch
          - minor
          - major
          - custom
      custom_version:
        description: 'Required if bump == custom (e.g. 6.7.0-beta.1, 6.6.1)'
        type: string
        required: false

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare:
    name: Open release PR
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Validate inputs
        env:
          BUMP: ${{ inputs.bump }}
          CUSTOM: ${{ inputs.custom_version }}
        run: |
          if [ "$BUMP" = "custom" ]; then
            if [ -z "$CUSTOM" ]; then
              echo "::error::custom_version is required when bump=custom" >&2
              exit 1
            fi
            # Basic semver shape check: X.Y.Z optionally followed by -prerelease
            if ! echo "$CUSTOM" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'; then
              echo "::error::custom_version '$CUSTOM' is not a valid semver string" >&2
              exit 1
            fi
          else
            if [ -n "$CUSTOM" ]; then
              echo "::error::custom_version must be empty unless bump=custom" >&2
              exit 1
            fi
          fi

      - name: Checkout main
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0 # zizmor: ignore[cache-poisoning]
        with:
          node-version-file: ".node-version"
          cache: ''

      - name: Enable Corepack (Yarn 4)
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Resolve bump argument
        id: bump
        env:
          BUMP: ${{ inputs.bump }}
          CUSTOM: ${{ inputs.custom_version }}
        run: |
          if [ "$BUMP" = "custom" ]; then
            echo "value=$CUSTOM" >> "$GITHUB_OUTPUT"
          else
            echo "value=$BUMP" >> "$GITHUB_OUTPUT"
          fi

      - name: Run lerna version
        env:
          BUMP_VALUE: ${{ steps.bump.outputs.value }}
        run: |
          npx lerna version "$BUMP_VALUE" --no-push --no-git-tag-version --yes

      - name: Read resolved version
        id: version
        run: |
          VERSION=$(node -p "require('./lerna.json').version")
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"

      - name: Create release branch and push
        env:
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          git checkout -b "release/v$VERSION"
          git add -A
          git commit -m "release: v$VERSION"
          git push origin "release/v$VERSION"

      - name: Open release PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.value }}
          BUMP: ${{ inputs.bump }}
          ACTOR: ${{ github.actor }}
        run: |
          gh pr create \
              --base main \
              --head "release/v$VERSION" \
              --title "release: v$VERSION" \
              --label "release" \
              --body "Automated release PR opened by @$ACTOR (bump=\`$BUMP\`).

          Merging this PR triggers \`release.yml\`, which publishes \`@embrace-io/react-native@$VERSION\` and the four sibling packages to npm.

          **Post-merge checklist:**
          - [ ] Verify packages appear on https://www.npmjs.com/org/embrace-io
          - [ ] Confirm the published package runs on the latest supported version of React Native
          - [ ] Update the [external changelog](https://github.com/embrace-io/embrace-docs/blob/main/docs/react-native/changelog.md)

          To abort: close this PR without merging."
