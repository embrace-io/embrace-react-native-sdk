name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Type of version bump'
        type: choice
        required: true
        options:
          - patch
          - minor
          - major
          - custom
      custom_version:
        description: 'Required if bump == custom (e.g. 6.7.0-beta.1, 6.6.1)'
        type: string
        required: false

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare:
    name: Open release PR
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Validate inputs
        env:
          BUMP: ${{ inputs.bump }}
          CUSTOM: ${{ inputs.custom_version }}
        run: |
          if [ "$BUMP" = "custom" ]; then
            if [ -z "$CUSTOM" ]; then
              echo "::error::custom_version is required when bump=custom" >&2
              exit 1
            fi
            # Basic semver shape check: X.Y.Z optionally followed by -prerelease
            if ! echo "$CUSTOM" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'; then
              echo "::error::custom_version '$CUSTOM' is not a valid semver string" >&2
              exit 1
            fi
          else
            if [ -n "$CUSTOM" ]; then
              echo "::error::custom_version must be empty unless bump=custom" >&2
              exit 1
            fi
          fi

      - name: Checkout main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          fetch-depth: 1
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6.4.0 # zizmor: ignore[cache-poisoning] - job doesn't produce published artifacts
        with:
          node-version-file: ".node-version"
          package-manager-cache: false

      - name: Enable Corepack (Yarn 4)
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Configure git identity
        run: |
          git config user.name "embrace-ci[bot]"
          git config user.email "embrace-ci@users.noreply.github.com"

      - name: Resolve bump argument
        id: bump
        env:
          BUMP: ${{ inputs.bump }}
          CUSTOM: ${{ inputs.custom_version }}
        run: |
          if [ "$BUMP" = "custom" ]; then
            echo "value=$CUSTOM" >> "$GITHUB_OUTPUT"
          else
            echo "value=$BUMP" >> "$GITHUB_OUTPUT"
          fi

      - name: Run lerna version
        env:
          BUMP_VALUE: ${{ steps.bump.outputs.value }}
        run: |
          npx lerna version "$BUMP_VALUE" --no-push --no-git-tag-version --yes

      - name: Read resolved version
        id: version
        run: |
          VERSION=$(node -p "require('./lerna.json').version")
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"

      - name: Create release branch and push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          git checkout -b "release/v$VERSION"
          git add -A
          git commit -m "release: v$VERSION"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin "release/v$VERSION"

      - name: Open release PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.value }}
          BUMP: ${{ inputs.bump }}
        run: |
          gh pr create \
              --base main \
              --head "release/v$VERSION" \
              --title "release: v$VERSION" \
              --label "release" \
              --assignee "$GITHUB_ACTOR" \
              --body "Automated release PR opened by @$GITHUB_ACTOR (bump=\`$BUMP\`).

          Merging this PR triggers \`release.yml\`, which publishes \`@embrace-io/react-native@$VERSION\` and the four sibling packages to npm.

          **Post-merge checklist:**
          - [ ] Verify packages appear on https://www.npmjs.com/org/embrace-io
          - [ ] Confirm the published package runs on the latest supported version of React Native
          - [ ] Update the [external changelog](https://github.com/embrace-io/embrace-docs/blob/main/docs/react-native/changelog.md)

          To abort: close this PR without merging."
