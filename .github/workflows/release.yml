name: Release

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write
  id-token: write   # required for npm provenance attestation

jobs:
  publish:
    name: Publish to npm
    if: >
      github.event.pull_request.merged == true &&
      contains(github.event.pull_request.labels.*.name, 'release')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout merge commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          fetch-depth: 1
          persist-credentials: false

      - name: Setup Node + npm auth
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: ".node-version"
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Enable Corepack (Yarn 4)
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build all packages
        run: yarn build

      - name: Read version and determine dist-tag
        id: version
        run: |
          VERSION=$(node -p "require('./lerna.json').version")
          # Versions with a pre-release segment (e.g. 6.7.0-beta.1) publish to 'next'; stable to 'latest'
          case "$VERSION" in
            *-*) DIST_TAG=next ;;
            *)   DIST_TAG=latest ;;
          esac
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"
          echo "dist_tag=$DIST_TAG" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION  dist-tag: $DIST_TAG"

      - name: Publish to npm
        # from-package is idempotent for partial failures, but exits non-zero if all packages
        # are already published. If this step fails after a prior successful publish, recover
        # manually — see DEVELOPING.md § "Release workflow: publish succeeds but tag or GitHub release was not created"
        env:
          DIST_TAG: ${{ steps.version.outputs.dist_tag }}
          NPM_CONFIG_PROVENANCE: "true"
        run: |
          npx lerna publish from-package --yes --dist-tag "$DIST_TAG"


      - name: Configure git identity
        run: |
          git config user.name "embrace-ci[bot]"
          git config user.email "embrace-ci@users.noreply.github.com"

      - name: Push git tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          VERSION: ${{ steps.version.outputs.value }}
          MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        run: |
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          if git ls-remote --tags origin "refs/tags/v$VERSION" | grep -q .; then
            echo "Tag v$VERSION already exists, skipping."
          else
            git tag "v$VERSION" "$MERGE_SHA"
            git push origin "v$VERSION"
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.value }}
          MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
          DIST_TAG: ${{ steps.version.outputs.dist_tag }}
        run: |
          if gh release view "v$VERSION" &>/dev/null; then
            echo "Release v$VERSION already exists, skipping."
          else
            PRERELEASE_FLAG=""
            if [ "$DIST_TAG" = "next" ]; then
              PRERELEASE_FLAG="--prerelease"
            fi
            gh release create "v$VERSION" \
                --target "$MERGE_SHA" \
                --title "v$VERSION" \
                --generate-notes \
                $PRERELEASE_FLAG
          fi
