buildscript {
    ext {
        buildToolsVersion = "34.0.0"
        minSdkVersion = 23
        compileSdkVersion = 34
        targetSdkVersion = 34
        ndkVersion = "26.1.10909125"
        kotlinVersion = "2.0.21" // Minimum Kotlin version for Embrace Android SDK v8
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        // Minimum AGP version to avoid desugaring issues is 8.3.0, but some transitive deps of Embrace Android SDK carry kotlin 2.1 metadata, 
        // so we use AGP 8.6 to avoid metadata version conflict warnings
        classpath("com.android.tools.build:gradle:8.6.0")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlinVersion")
    }
}

apply plugin: "com.facebook.react.rootproject"
